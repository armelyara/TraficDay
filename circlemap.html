<!DOCTYPE html>
<html>

<head>
    <title>Circles</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAo6sSAOZoH89I87SR1fMHihWVosv-mTfs&callback=initMap&libraries=&v=weekly" defer></script>
    <style type="text/css">
        /* Always set the map height explicitly to define the size of the div
       * element that contains the map. */
        
        #map {
            height: 100%;
        }
        /* Optional: Makes the sample page fill the window. */
        
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <script>
        "use strict";

        const citymap = {
            angrecitefondasso: {
                center: {
                    lat: 5.4115967,
                    lng: -3.9885078
                },
                population: 447055
            },
            Attécoubé: {
                center: {
                    lat: 5.333,
                    lng: -4.054
                },
                population: 260911
            },
            Carrefourzoo: {
                center: {
                    lat: 5.3813304,
                    lng: 4.0080437
                },
                population: 1030658
            },
            Rivierapalmeraie: {
                center: {
                    lat: 5.3715223,
                    lng: -3.964041
                },
                population: 447055
            }
        };

        function initMap() {
            // Create the map.
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 13,
                center: {
                    lat: 5.3484461,
                    lng: -4.0497051
                },
                mapTypeId: "terrain"
            }); // Construct the circle for each value in citymap.
            // Note: We scale the area of the circle based on the population.

            for (const city in citymap) {
                // Add the circle for this city to the map.
                const cityCircle = new google.maps.Circle({
                    strokeColor: "#FF0000",
                    strokeOpacity: 0.5,
                    strokeWeight: 2,
                    fillColor: "#FF0000",
                    fillOpacity: 0.15,
                    map,
                    center: citymap[city].center,
                    radius: Math.sqrt(citymap[city].population) * 1
                });
            }
        }
    </script>
</head>

<body>
    <div id="map"></div>
</body>

</html>
